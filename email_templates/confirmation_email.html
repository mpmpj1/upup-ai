<!DOCTYPE html>
<html lang="zh-CN">
  <body style="margin:0;background:#f6f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;background:#f6f7fb;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #e5e7eb;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(15,23,42,0.08);">
            <tr>
              <td style="padding:36px 36px 12px 36px;">
                <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#a16207;font-weight:700;">UpUp AI / 涨涨AI</div>
                <h1 style="margin:16px 0 12px 0;font-size:28px;line-height:1.2;font-weight:700;color:#0f172a;">确认你的邮箱</h1>
                <p style="margin:0;font-size:15px;line-height:1.8;color:#475569;">
                  只差最后一步。确认完成后，你就可以进入涨涨AI，开始体验低噪音、结论优先的金融研究工作台。
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 36px 8px 36px;">
                <a
                  href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=email"
                  style="display:inline-block;padding:14px 24px;border-radius:999px;background:#111827;color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;"
                >
                  确认邮箱
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 36px 20px 36px;">
                <p style="margin:0;font-size:13px;line-height:1.8;color:#64748b;">
                  如果按钮无法点击，请把下面这条链接复制到浏览器打开：
                </p>
                <p style="margin:8px 0 0 0;font-size:13px;line-height:1.8;color:#111827;word-break:break-all;">
                  {{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=email
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 36px 32px 36px;">
                <div style="padding-top:20px;border-top:1px solid #e5e7eb;font-size:12px;line-height:1.8;color:#94a3b8;">
                  如果这不是你本人的操作，可以直接忽略这封邮件。
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
